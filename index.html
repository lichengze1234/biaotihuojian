<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书爆款标题生成器 - 标题火箭</title>
    <style>
        :root {
            --primary-color: #ff2442; /* 小红书红 */
            --bg-color: #f8f8f8;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box; /* 关键：防止输入框溢出 */
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        button.generate-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        button.generate-btn:hover {
            opacity: 0.9;
        }

        .result-area {
            margin-top: 30px;
            text-align: left;
            display: none; /* 默认隐藏 */
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .result-item {
            background: #fff5f7;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 15px;
            color: #333;
            border-left: 4px solid var(--primary-color);
            cursor: pointer;
            position: relative;
        }

        .result-item:active {
            transform: scale(0.98);
        }

        .copy-hint {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 10px;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 头部 -->
        <h1>🚀 标题火箭</h1>
        <p class="subtitle">输入关键词，一键生成小红书爆款标题</p>

        <!-- 输入区 -->
        <div class="input-group">
            <label for="keyword">你的笔记主题是什么？</label>
            <input type="text" id="keyword" placeholder="例如：减肥、学英语、甚至只是发呆...">
        </div>

        <!-- 按钮 -->
        <button class="generate-btn" onclick="generateTitles()">✨ 立即生成标题</button>

        <!-- 结果展示区 -->
        <div class="result-area" id="resultArea">
            <label>🔥 推荐标题（点击复制）：</label>
            <div id="titlesList"></div>
            <p class="copy-hint">💡 点击标题即可复制到剪贴板</p>
        </div>

        <div class="footer">
            Powered by GitHub Pages • 演示版 v1.0
        </div>
    </div>

    <script>
        function generateTitles() {
            const keyword = document.getElementById('keyword').value.trim();
            const resultArea = document.getElementById('resultArea');
            const titlesList = document.getElementById('titlesList');

            if (!keyword) {
                alert("请先输入一个关键词哦！");
                return;
            }

            // 这里是模拟的AI逻辑（预设模板）
            // 未来我们可以接入真正的API
            const templates = [
                `救命！${keyword}真的太绝了😭谁懂啊`,
                `关于${keyword}，这几点你必须知道❗️`,
                `家人们！${keyword}避雷指南⚡️不看后悔`,
                `沉浸式体验${keyword}，结局万万没想到...`,
                `这就是${keyword}的天花板吗？爱了爱了❤️`,
                `答应我！一定要去试一次${keyword}好吗？`,
                `零基础${keyword}教程，手残党也能学会✅`,
                `${keyword}千万别乱做！听听过来人的建议👂`
            ];

            // 清空旧结果
            titlesList.innerHTML = '';

            // 随机打乱并取前3个
            const randomTitles = templates.sort(() => 0.5 - Math.random()).slice(0, 3);

            // 生成HTML
            randomTitles.forEach(title => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerText = title;
                div.onclick = function() {
                    copyToClipboard(title);
                };
                titlesList.appendChild(div);
            });

            // 显示结果区
            resultArea.style.display = 'block';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('复制成功：' + text);
            }).catch(err => {
                console.error('无法复制', err);
            });
        }
    </script>
</body>
</html>
