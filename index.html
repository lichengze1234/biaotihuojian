<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Rocket Pro - AI 爆款标题生成器</title>
    <style>
        /* --- 基础样式重置 --- */
        :root {
            --primary-color: #4f46e5; /* 靛蓝色主色调 */
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --border-color: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
        }

        /* --- 头部样式 --- */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            color: #111827;
        }

        .subtitle {
            color: var(--text-sub);
            font-size: 14px;
        }

        /* --- 卡片通用样式 --- */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            padding: 30px;
            margin-bottom: 30px;
        }

        /* --- 平台切换 Tab --- */
        .platform-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* --- 输入区域 --- */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background-color: white;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        /* --- 结果展示区域 --- */
        .result-box {
            background-color: #f9fafb;
            border-radius: 8px;
            padding: 20px;
            min-height: 100px;
            border: 1px dashed var(--border-color);
        }

        .title-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-text {
            font-weight: 500;
            color: #374151;
        }

        .view-count {
            font-size: 12px;
            color: #ef4444; /* 红色强调热度 */
            background: #fef2f2;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .error-msg {
            color: #ef4444;
            text-align: center;
            padding: 20px;
        }

        .loading {
            text-align: center;
            color: var(--text-sub);
            padding: 20px;
        }

        /* 底部搜索栏样式微调 */
        .search-section h3 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-desc {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 15px;
        }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI 爆款标题生成器</h1>
        <p class="subtitle">DeepSeek 驱动 · 多平台适配 · 一键生成高点击率标题</p>
    </header>

    <!-- 模块 1：AI 标题生成 -->
    <div class="card">
        <div class="platform-tabs">
            <button class="tab-btn active" onclick="switchPlatform('xhs')">📕 小红书</button>
            <button class="tab-btn" onclick="switchPlatform('dy')">🎵 抖音</button>
        </div>

        <div class="input-group">
            <input type="text" id="keyword-input" placeholder="请输入关键词，例如：减肥餐、职场穿搭...">
            <button class="btn-primary" onclick="generateTitles()">
                ✨ AI 生成
            </button>
        </div>

        <div id="generation-results" class="result-box">
            <div style="color: #9ca3af; text-align: center; padding-top: 30px;">等待生成...</div>
        </div>
    </div>

    <!-- 模块 2：对标拆解 -->
    <div class="card search-section">
        <h3>🔍 爆款对标拆解</h3>
        <p class="search-desc">输入领域关键词，系统将自动抓取全网热门视频标题，并分析爆点。</p>

        <div class="input-group">
            <input type="text" id="search-input" placeholder="输入领域关键词...">
            <button class="btn-secondary" onclick="analyzeCompetitors()">搜索热门素材</button>
        </div>

        <div id="analysis-results" class="result-box">
            <div style="color: #9ca3af; text-align: center; padding-top: 30px;">暂无搜索结果</div>
        </div>
    </div>
</div>

<script>
    // ================= 核心配置 =================
    // 你的 Worker 地址
    const WORKER_API_URL = 'https://title-rocket.li987270446.workers.dev';
    let currentPlatform = 'xhs'; // 默认小红书

    // 切换平台逻辑
    function switchPlatform(platform) {
        currentPlatform = platform;
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(tab => tab.classList.remove('active'));

        // 简单的样式切换逻辑
        if (platform === 'xhs') {
            tabs[0].classList.add('active');
        } else {
            tabs[1].classList.add('active');
        }
    }

    // ================= 功能 1：生成标题 =================
    async function generateTitles() {
        const keyword = document.getElementById('keyword-input').value.trim();
        const resultBox = document.getElementById('generation-results');

        if (!keyword) {
            alert('请输入关键词！');
            return;
        }

        // 显示加载状态
        resultBox.innerHTML = '<div class="loading">正在调用 DeepSeek 模型思考中... ⏳</div>';

        try {
            // 构建 URL：使用 GET 请求，参数拼在 URL 后面
            const url = `${WORKER_API_URL}/generate?keyword=${encodeURIComponent(keyword)}&platform=${currentPlatform}`;

            const response = await fetch(url);

            if (!response.ok) {
                throw new Error(`API 请求失败: ${response.status}`);
            }

            const data = await response.json();

            // 渲染结果
            if (data.success && data.data && data.data.length > 0) {
                let html = '';
                data.data.forEach(item => {
                    html += `
                        <div class="title-item">
                            <span class="title-text">${item.title}</span>
                            <span class="view-count">预估浏览: ${item.views || 'High'}</span>
                        </div>
                    `;
                });
                resultBox.innerHTML = html;
            } else {
                resultBox.innerHTML = '<div class="error-msg">未生成有效标题，请重试。</div>';
            }

        } catch (error) {
            console.error(error);
            resultBox.innerHTML = `<div class="error-msg">❌ 生成失败: ${error.message}<br><small>请检查控制台或确认 Worker 服务正常</small></div>`;
        }
    }

    // ================= 功能 2：对标拆解 =================
    async function analyzeCompetitors() {
        const keyword = document.getElementById('search-input').value.trim();
        const resultBox = document.getElementById('analysis-results');

        if (!keyword) {
            alert('请输入搜索关键词！');
            return;
        }

        // 显示加载状态
        resultBox.innerHTML = '<div class="loading">正在全网搜索热门素材... 🔍</div>';

        try {
            // 构建 URL
            const url = `${WORKER_API_URL}/search?keyword=${encodeURIComponent(keyword)}`;

            const response = await fetch(url);

            if (!response.ok) {
                throw new Error(`服务器响应错误: ${response.status}`);
            }

            const data = await response.json();

            // 渲染结果
            if (data.success && data.data && data.data.length > 0) {
                let html = '';
                data.data.forEach(item => {
                    html += `
                        <div class="title-item">
                            <span class="title-text">${item.title}</span>
                            <span class="view-count">🔥 ${item.views}</span>
                        </div>
                    `;
                });
                resultBox.innerHTML = html;
            } else {
                resultBox.innerHTML = '<div class="error-msg">未找到相关热门素材。</div>';
            }

        } catch (error) {
            console.error(error);
            resultBox.innerHTML = `<div class="error-msg">❌ 搜索出错: ${error.message}</div>`;
        }
    }
</script>

</body>
</html>
