<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Rocket Pro - AI 爆款标题生成器</title>
    <style>
        /* --- 基础样式重置 --- */
        :root {
            --primary-color: #4f46e5; /* 靛蓝色主色调 */
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --border-color: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
        }

        /* --- 头部样式 --- */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            color: #111827;
        }

        .subtitle {
            color: var(--text-sub);
            font-size: 14px;
        }

        /* --- 卡片通用样式 --- */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            padding: 30px;
            margin-bottom: 30px;
        }

        /* --- 平台切换 Tab --- */
        .platform-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* --- 输入区域 --- */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background-color: white;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        /* --- 结果展示区域 --- */
        .result-box {
            background-color: #f9fafb;
            border-radius: 8px;
            padding: 20px;
            min-height: 100px;
            border: 1px dashed var(--border-color);
        }

        .title-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-text {
            font-weight: 500;
            color: #374151;
        }

        .view-count {
            font-size: 12px;
            color: #ef4444; /* 红色强调热度 */
            background: #fef2f2;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .error-msg {
            color: #ef4444;
            text-align: center;
            padding: 20px;
        }

        .loading {
            text-align: center;
            color: var(--text-sub);
            padding: 20px;
        }

        /* 底部搜索栏样式微调 */
        .search-section h3 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-desc {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 15px;
        }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI 爆款标题生成器</h1>
        <p class="subtitle">DeepSeek 驱动 · 多平台适配 · 一键生成高点击率标题</p>
    </header>

    <!-- 模块 1：AI 标题生成 -->
    <div class="card">
        <div class="platform-tabs">
            <button class="tab-btn active" onclick="switchPlatform('xhs')">📕 小红书</button>
            <button class="tab-btn" onclick="switchPlatform('dy')">🎵 抖音</button>
        </div>

        <div class="input-group">
            <input type="text" id="keyword-input" placeholder="请输入关键词，例如：减肥餐、职场穿搭...">
            <button class="btn-primary" onclick="generateTitles()">
                ✨ AI 生成
            </button>
        </div>

        <div id="generation-results" class="result-box">
            <div style="color: #9ca3af; text-align: center; padding-top: 30px;">等待生成...</div>
        </div>
    </div>

    <!-- 模块 2：对标拆解 -->
    <div class="card search-section">
        <h3>🔍 爆款对标拆解</h3>
        <p class="search-desc">输入领域关键词，系统将自动抓取全网热门视频标题，并分析爆点。</p>

        <div class="input-group">
            <input type="text" id="search-input" placeholder="输入领域关键词...">
            <button class="btn-secondary" onclick="analyzeCompetitors()">搜索热门素材</button>
        </div>

        <div id="analysis-results" class="result-box">
            <div style="color: #9ca3af; text-align: center; padding-top: 30px;">暂无搜索结果</div>
        </div>
    </div>
</div>

<script>
    // ================= 核心配置 =================
    const WORKER_API_URL = 'https://title-rocket.li987270446.workers.dev';
    let currentPlatform = 'xhs'; // 默认小红书

    // 切换平台逻辑
    function switchPlatform(platform) {
        currentPlatform = platform;
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(tab => tab.classList.remove('active'));
        if (platform === 'xhs') {
            tabs[0].classList.add('active');
        } else {
            tabs[1].classList.add('active');
        }
    }

    // ================= 功能 1：AI 生成标题 =================
    async function generateTitles() {
        const inputEl = document.getElementById('keyword-input');
        const resultsContainer = document.getElementById('results-container');
        const keyword = inputEl.value.trim();

        if (!keyword) {
            alert('请输入关键词！');
            return;
        }

        // 1. 显示加载状态
        resultsContainer.innerHTML = '<div class="loading-state">🚀 AI 正在思考中...</div>';

        try {
            // 2. 发起请求 (使用 GET 请求，带上关键词和平台)
            const response = await fetch(`${WORKER_API_URL}/generate?keyword=${encodeURIComponent(keyword)}&platform=${currentPlatform}`);

            if (!response.ok) throw new Error(`服务器响应错误: ${response.status}`);

            const resData = await response.json();

            // 3. 渲染结果
            if (resData.success && resData.data && resData.data.length > 0) {
                renderTitleCards(resData.data);
            } else {
                resultsContainer.innerHTML = '<div class="error-state">❌ 生成失败：未获取到有效数据</div>';
            }

        } catch (error) {
            console.error(error);
            resultsContainer.innerHTML = `<div class="error-state">❌ 请求出错: ${error.message}</div>`;
        }
    }

    // 渲染标题卡片的核心函数
    function renderTitleCards(dataList) {
        const container = document.getElementById('results-container');
        container.innerHTML = ''; // 清空旧数据

        dataList.forEach(item => {
            // 【关键修复】兼容不同的字段名 (title, content, text)
            // 优先找 title，找不到找 content，再找不到找 text
            const titleText = item.title || item.content || item.text || "无标题内容";
            const views = item.views || "High"; // 默认显示 High

            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <div class="card-content">${titleText}</div>
                <div class="card-badge">预估浏览: ${views}</div>
            `;
            container.appendChild(card);
        });
    }

    // ================= 功能 2：爆款对标拆解 =================
    async function searchCompetitors() {
        const inputEl = document.getElementById('competitor-keyword'); // 确保 HTML 里有这个 ID
        const resultsArea = document.getElementById('competitor-results'); // 确保 HTML 里有这个 ID
        const keyword = inputEl ? inputEl.value.trim() : "";

        if (!keyword) {
            alert('请输入要拆解的关键词！');
            return;
        }

        resultsArea.innerHTML = '<div class="loading-state">🔍 正在全网搜索热门素材...</div>';

        try {
            // 发起搜索请求
            const response = await fetch(`${WORKER_API_URL}/search?keyword=${encodeURIComponent(keyword)}`);

            if (!response.ok) throw new Error(`服务器响应错误: ${response.status}`);

            const resData = await response.json();

            if (resData.success) {
                 // 这里假设后端返回的是列表，如果不是，需要根据实际结构调整
                 // 为了演示，我们暂时把返回的 data 直接打印出来，或者尝试渲染
                 if(Array.isArray(resData.data)) {
                     renderCompetitorList(resData.data);
                 } else {
                     resultsArea.innerHTML = `<div class="success-state">✅ 搜索完成，但未发现结构化列表数据。<br>原始数据: ${JSON.stringify(resData.data).substring(0, 100)}...</div>`;
                 }
            } else {
                resultsArea.innerHTML = `<div class="error-state">❌ 搜索失败: ${resData.message || '未知错误'}</div>`;
            }

        } catch (error) {
            console.error(error);
            resultsArea.innerHTML = `<div class="error-state">❌ 搜索出错: ${error.message}</div>`;
        }
    }

    // 简单的对标结果渲染（如果后端返回了列表）
    function renderCompetitorList(list) {
         const container = document.getElementById('competitor-results');
         container.innerHTML = '';
         list.forEach(item => {
             const div = document.createElement('div');
             div.style.padding = "10px";
             div.style.borderBottom = "1px solid #eee";
             // 同样兼容字段名
             div.innerText = item.title || item.content || JSON.stringify(item);
             container.appendChild(div);
         });
    }

    // 页面加载完成后绑定事件（防止按钮点击没反应）
    document.addEventListener('DOMContentLoaded', () => {
        // 绑定生成按钮
        const genBtn = document.querySelector('.btn-primary'); // 假设生成按钮是这个类
        if(genBtn) genBtn.onclick = generateTitles;

        // 绑定搜索按钮
        const searchBtn = document.querySelector('.btn-secondary'); // 假设搜索按钮是这个类
        if(searchBtn) searchBtn.onclick = searchCompetitors;
    });
</script>

</body>
</html>
